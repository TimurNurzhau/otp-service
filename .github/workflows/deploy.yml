name: Deploy to Server

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create config files for build
        run: |
          mkdir -p src/main/resources
          echo "db.url=jdbc:postgresql://localhost:5432/otp_service" > src/main/resources/db.properties
          echo "db.username=postgres" >> src/main/resources/db.properties
          echo "db.password=postgres" >> src/main/resources/db.properties
          echo "jwt.secret=buildSecretKeyForDeploy2024" > src/main/resources/jwt.properties
          echo "jwt.expiration.ms=86400000" >> src/main/resources/jwt.properties

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-service-jar
          path: target/*.jar

      - name: Deploy to server (example)
        run: |
          echo "========================================="
          echo "Deployment ready for production"
          echo "JAR file built successfully"
          echo "========================================="
          echo "To deploy manually:"
          echo "  scp target/otp-service-1.0-SNAPSHOT.jar user@server:/app/"
          echo "  ssh user@server 'systemctl restart otp-service'"