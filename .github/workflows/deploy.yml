name: Deploy to Server

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: otp-service-jar
          path: .

      - name: Deploy to server (example)
        run: |
          echo "Deploying otp-service.jar to production server"
          # Здесь можно добавить реальный деплой:
          # scp otp-service.jar user@server:/app/
          # ssh user@server 'systemctl restart otp-service'