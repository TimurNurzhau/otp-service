name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: otp_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create config files for CI
        run: |
          mkdir -p src/main/resources
          echo "db.url=jdbc:postgresql://localhost:5432/otp_service" > src/main/resources/db.properties
          echo "db.username=postgres" >> src/main/resources/db.properties
          echo "db.password=postgres" >> src/main/resources/db.properties
          echo "jwt.secret=ciTestSecretKeyForGithubActions2024WithEnoughLength" > src/main/resources/jwt.properties
          echo "jwt.expiration.ms=86400000" >> src/main/resources/jwt.properties
          echo "email.username=" > src/main/resources/email.properties
          echo "email.password=" >> src/main/resources/email.properties
          echo "email.from=" >> src/main/resources/email.properties
          echo "mail.smtp.host=smtp.gmail.com" >> src/main/resources/email.properties
          echo "mail.smtp.port=587" >> src/main/resources/email.properties
          echo "mail.smtp.auth=true" >> src/main/resources/email.properties
          echo "mail.smtp.starttls.enable=true" >> src/main/resources/email.properties
          echo "smpp.host=localhost" > src/main/resources/sms.properties
          echo "smpp.port=2775" >> src/main/resources/sms.properties
          echo "smpp.system_id=smppclient1" >> src/main/resources/sms.properties
          echo "smpp.password=password" >> src/main/resources/sms.properties
          echo "smpp.system_type=OTP" >> src/main/resources/sms.properties
          echo "smpp.source_addr=OTPService" >> src/main/resources/sms.properties
          echo "telegram.bot.token=" > src/main/resources/telegram.properties
          echo "telegram.chat.id=" >> src/main/resources/telegram.properties

      - name: Run database migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d otp_service -f src/main/resources/db/migration/V1__create_tables.sql

      - name: Compile with Maven
        run: mvn clean compile

      - name: Run tests
        run: mvn test

      - name: Generate coverage report
        run: mvn jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-service-jar
          path: target/*.jar

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'OTP Service'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports

  notify:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: always()

    steps:
      - name: Check status
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ CI/CD Pipeline completed successfully!"
          else
            echo "❌ CI/CD Pipeline failed!"
            exit 1
          fi